name: Upstream Sync Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

jobs:
  check:
    name: Check upstream changes
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap manifest when missing
        run: |
          if [ ! -f .upstream-sync/manifest.json ]; then
            node scripts/upstream-sync.ts bootstrap --source-mode remote --artifact-dir .artifacts/upstream-sync-ci/bootstrap
          fi

      - name: Check upstreams
        run: node scripts/upstream-sync.ts check --source-mode remote --artifact-dir .artifacts/upstream-sync-ci/check

      - name: Write job summary
        run: |
          cat .artifacts/upstream-sync-ci/check/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sync artifacts
        uses: actions/upload-artifact@v4
        with:
          name: upstream-sync-report
          path: .artifacts/upstream-sync-ci/
